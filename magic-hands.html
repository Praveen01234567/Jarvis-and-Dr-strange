<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Permissions-Policy" content="camera=*">
<title>Magic Hands</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; touch-action: none; }
  #container { position: relative; width: 100vw; height: 100vh; }

  video {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; transform: scaleX(-1);
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Mode switcher ─────────────────────────────── */
  #modeBar {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 20;
  }
  .modeBtn {
    padding: 10px 22px; border-radius: 40px; border: none;
    font-size: 13px; font-weight: 700; letter-spacing: 2px; cursor: pointer;
    transition: all 0.3s; text-transform: uppercase;
  }
  #btnJarvis {
    background: rgba(0,180,255,0.12); border: 1.5px solid #00b4ff;
    color: #00b4ff; font-family: 'Orbitron', monospace;
  }
  #btnJarvis.active {
    background: rgba(0,180,255,0.35); box-shadow: 0 0 20px #00b4ff88;
  }
  #btnStrange {
    background: rgba(255,120,0,0.12); border: 1.5px solid #ff7800;
    color: #ff9a00; font-family: 'Cinzel', serif;
  }
  #btnStrange.active {
    background: rgba(255,120,0,0.35); box-shadow: 0 0 20px #ff780088;
  }

  /* ── Status ────────────────────────────────────── */
  #status {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: #fff8; font-size: 15px; z-index: 10; letter-spacing: 3px;
    text-transform: uppercase; text-align: center; pointer-events: none;
    font-family: 'Orbitron', monospace;
  }

  /* ── JARVIS HUD elements ───────────────────────── */
  #jarvisHUD {
    position: absolute; inset: 0; pointer-events: none; z-index: 8;
    opacity: 0; transition: opacity 0.5s;
  }
  #jarvisHUD.visible { opacity: 1; }

  /* Corner brackets */
  .corner {
    position: absolute; width: 60px; height: 60px;
    border-color: #00b4ff; border-style: solid; opacity: 0.5;
  }
  .corner.tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

  /* Scan line */
  #scanLine {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, #00b4ff44, #00b4ffcc, #00b4ff44, transparent);
    animation: scan 3s linear infinite; top: 0;
  }
  @keyframes scan { 0% { top: 0; opacity: 1; } 100% { top: 100%; opacity: 0.2; } }

  /* Data readout panels */
  #dataLeft {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: #00b4ff; font-family: 'Orbitron', monospace; font-size: 10px;
    line-height: 2; letter-spacing: 1px; opacity: 0.7;
  }
  #dataRight {
    position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    color: #00b4ff; font-family: 'Orbitron', monospace; font-size: 10px;
    line-height: 2; letter-spacing: 1px; opacity: 0.7; text-align: right;
  }
  #jarvisTitle {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    color: #00b4ff; font-family: 'Orbitron', monospace; font-size: 14px;
    font-weight: 900; letter-spacing: 6px; text-shadow: 0 0 20px #00b4ff;
    white-space: nowrap;
  }
  .dataLine { display: flex; gap: 8px; }
  .dataKey { opacity: 0.5; }
  .dataVal { color: #7fffff; animation: blink 2s step-end infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }

  /* ── START button ──────────────────────────────── */
  #startBtn {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 30; background: rgba(0,180,255,0.15); border: 2px solid #00b4ff;
    color: #00b4ff; font-size: 16px; padding: 18px 36px; border-radius: 8px;
    cursor: pointer; letter-spacing: 3px; font-family: 'Orbitron', monospace;
    display: none; text-transform: uppercase;
    box-shadow: 0 0 30px #00b4ff44;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- JARVIS HUD overlay -->
  <div id="jarvisHUD">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="scanLine"></div>
    <div id="jarvisTitle">J.A.R.V.I.S — ONLINE</div>
    <div id="dataLeft">
      <div class="dataLine"><span class="dataKey">SYS</span><span class="dataVal" id="d1">NOMINAL</span></div>
      <div class="dataLine"><span class="dataKey">HANDS</span><span class="dataVal" id="d2">0</span></div>
      <div class="dataLine"><span class="dataKey">GESTURE</span><span class="dataVal" id="d3">SCAN</span></div>
      <div class="dataLine"><span class="dataKey">CONF</span><span class="dataVal" id="d4">--</span></div>
      <div class="dataLine"><span class="dataKey">FRAME</span><span class="dataVal" id="d5">0</span></div>
    </div>
    <div id="dataRight">
      <div class="dataLine"><span class="dataVal" id="d6">ARC REACTOR</span><span class="dataKey">PWR</span></div>
      <div class="dataLine"><span class="dataVal" id="d7">100%</span><span class="dataKey">SHIELD</span></div>
      <div class="dataLine"><span class="dataVal" id="d8">READY</span><span class="dataKey">REPULSOR</span></div>
      <div class="dataLine"><span class="dataVal" id="d9">ACTIVE</span><span class="dataKey">AI</span></div>
    </div>
  </div>

  <!-- Mode buttons -->
  <div id="modeBar">
    <button class="modeBtn active" id="btnJarvis" onclick="setMode('jarvis')">⬡ JARVIS</button>
    <button class="modeBtn" id="btnStrange" onclick="setMode('strange')">✦ DR. STRANGE</button>
  </div>

  <div id="status">Loading…</div>
  <button id="startBtn" onclick="startCamera()">▶ INITIALISE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ── Globals ────────────────────────────────────────────────────────────────
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const jarvisHUD = document.getElementById('jarvisHUD');

let mode = 'jarvis'; // 'jarvis' | 'strange'
let frameCount = 0;
let animRunning = false;
let lastHands = [];

// Strange magic circle particles
let particles = [];
let sparks = [];

// Jarvis arc energy nodes per hand
let arcNodes = [];

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Mode switcher ──────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnJarvis').classList.toggle('active', m === 'jarvis');
  document.getElementById('btnStrange').classList.toggle('active', m === 'strange');
  jarvisHUD.classList.toggle('visible', m === 'jarvis');
  particles = []; sparks = [];
}

// ── Helpers ────────────────────────────────────────────────────────────────
function toC(lm) {
  return { x: (1 - lm.x) * canvas.width, y: lm.y * canvas.height };
}

function dist2(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function getPinch(lms) {
  const d = dist2(toC(lms[4]), toC(lms[8])) / canvas.width;
  return { pinching: d < 0.06, pct: Math.max(0, Math.min(100, Math.round((1 - d / 0.1) * 100))) };
}

function glowLine(x1, y1, x2, y2, color, lw=2, blur=18) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function glowCircle(cx, cy, r, color, lw=1.5, blur=20, dash=[]) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.strokeStyle = color; ctx.lineWidth = lw;
  if (dash.length) ctx.setLineDash(dash);
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

function glowDot(x, y, r, color, blur=20) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── JARVIS mode drawing ────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];
const TIPS = [4,8,12,16,20];

function drawJarvisHand(lms, hi) {
  const blue  = '#00b4ff';
  const cyan  = '#00ffff';
  const white = '#ffffff';
  const palm  = toC(lms[0]);

  // Skeleton
  CONNECTIONS.forEach(([a,b]) => {
    const p1 = toC(lms[a]), p2 = toC(lms[b]);
    glowLine(p1.x,p1.y,p2.x,p2.y, blue+'99', 1, 6);
  });

  // Hex grid at palm
  drawHexGrid(palm.x, palm.y, 48, blue);

  // Arc reactor circle at palm
  glowCircle(palm.x, palm.y, 22, blue, 1.5, 25);
  glowCircle(palm.x, palm.y, 14, cyan+'88', 1, 15);
  // Rotating arc lines
  const rot = frameCount * 0.04;
  for (let i = 0; i < 6; i++) {
    const a = rot + (i / 6) * Math.PI * 2;
    const x2 = palm.x + Math.cos(a) * 22;
    const y2 = palm.y + Math.sin(a) * 22;
    glowLine(palm.x, palm.y, x2, y2, blue+'66', 1, 8);
  }
  glowDot(palm.x, palm.y, 5, cyan, 30);

  // Fingertip repulsor dots
  TIPS.forEach((ti, i) => {
    const p = toC(lms[ti]);
    const pulse = 0.5 + 0.5 * Math.sin(frameCount * 0.1 + i);
    glowCircle(p.x, p.y, 10 + pulse * 4, blue, 1, 18);
    glowDot(p.x, p.y, 4, white, 25);
    // Targeting bracket
    const s = 14;
    glowLine(p.x-s,p.y-s, p.x-s+5,p.y-s, blue, 1, 8);
    glowLine(p.x-s,p.y-s, p.x-s,p.y-s+5, blue, 1, 8);
    glowLine(p.x+s,p.y-s, p.x+s-5,p.y-s, blue, 1, 8);
    glowLine(p.x+s,p.y-s, p.x+s,p.y-s+5, blue, 1, 8);
  });

  // Pinch beam
  const { pinching } = getPinch(lms);
  if (pinching) {
    const t4 = toC(lms[4]), t8 = toC(lms[8]);
    for (let i = 0; i < 3; i++) {
      glowLine(t4.x,t4.y,t8.x,t8.y, [cyan,blue,'#ffffff'][i], [3,1.5,0.5][i], [30,15,5][i]);
    }
    glowDot((t4.x+t8.x)/2,(t4.y+t8.y)/2, 6, white, 40);
  }
}

function drawHexGrid(cx, cy, r, color) {
  ctx.save();
  ctx.strokeStyle = color+'44'; ctx.lineWidth = 0.8;
  ctx.shadowColor = color; ctx.shadowBlur = 6;
  const hex = r / 3;
  for (let row = -2; row <= 2; row++) {
    for (let col = -2; col <= 2; col++) {
      const ox = col * hex * 1.732 + (row % 2) * hex * 0.866;
      const oy = row * hex * 1.5;
      if (Math.hypot(ox, oy) > r) continue;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const x = cx + ox + Math.cos(a) * hex * 0.5;
        const y = cy + oy + Math.sin(a) * hex * 0.5;
        i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawJarvisBeam(h0, h1) {
  const pairs = [[4,4],[8,8],[12,12],[16,16],[20,20],[0,0],[4,20],[20,4]];
  pairs.forEach(([a,b], i) => {
    const p1 = toC(h0[a]), p2 = toC(h1[b]);
    const hue = (200 + i * 15) % 360;
    const c = `hsla(${hue},100%,70%,0.9)`;
    glowLine(p1.x,p1.y,p2.x,p2.y, c, i<5?2:1, 20);
    glowLine(p1.x,p1.y,p2.x,p2.y, '#ffffff', 0.4, 5);
    // Midpoint node
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    glowCircle(mx,my, 6+i, c, 1, 12);
  });
  // Energy arc between palms
  const pa = toC(h0[0]), pb = toC(h1[0]);
  const cpx = (pa.x+pb.x)/2, cpy = (pa.y+pb.y)/2 - 60;
  ctx.save();
  ctx.shadowColor='#00b4ff'; ctx.shadowBlur=30;
  ctx.strokeStyle='#00b4ff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.quadraticCurveTo(cpx,cpy,pb.x,pb.y); ctx.stroke();
  ctx.strokeStyle='#ffffff44'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.quadraticCurveTo(cpx,cpy,pb.x,pb.y); ctx.stroke();
  ctx.restore();
}

function updateJarvisHUD(hands) {
  document.getElementById('d2').textContent = hands.length;
  document.getElementById('d5').textContent = frameCount;
  if (hands.length > 0) {
    const { pinching, pct } = getPinch(hands[0]);
    document.getElementById('d3').textContent = pinching ? 'REPULSOR' : 'SCANNING';
    document.getElementById('d4').textContent = pct + '%';
    document.getElementById('d8').textContent = pinching ? 'FIRING' : 'READY';
  } else {
    document.getElementById('d3').textContent = 'NO TARGET';
    document.getElementById('d4').textContent = '--';
    document.getElementById('d8').textContent = 'STANDBY';
  }
  // Flicker random data
  if (frameCount % 20 === 0) {
    document.getElementById('d7').textContent = (95 + Math.floor(Math.random()*6)) + '%';
    document.getElementById('d6').textContent = ['ARC REACTOR','MARK XVII','STARK TECH'][Math.floor(Math.random()*3)];
  }
}

// ── DOCTOR STRANGE mode drawing ────────────────────────────────────────────
const RUNE_CHARS = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'];

function drawStrangeHand(lms, hi) {
  const gold  = '#ffaa00';
  const amber = '#ff6600';
  const white = '#fffde0';
  const palm  = toC(lms[0]);

  // Skeleton — amber glow
  CONNECTIONS.forEach(([a,b]) => {
    const p1=toC(lms[a]), p2=toC(lms[b]);
    glowLine(p1.x,p1.y,p2.x,p2.y, amber+'88', 1, 6);
  });

  // Palm magic circle
  const r1 = 38, r2 = 50, r3 = 62;
  const rot = frameCount * 0.02 * (hi===0?1:-1);
  glowCircle(palm.x,palm.y, r1, gold, 1.5, 25);
  glowCircle(palm.x,palm.y, r2, amber+'cc', 1, 15, [4,3]);
  glowCircle(palm.x,palm.y, r3, gold+'88', 0.8, 10);

  // Rotating outer rune circle
  for (let i=0; i<12; i++) {
    const a = rot + (i/12)*Math.PI*2;
    const x = palm.x + Math.cos(a)*r3;
    const y = palm.y + Math.sin(a)*r3;
    ctx.save();
    ctx.fillStyle = gold;
    ctx.shadowColor = gold; ctx.shadowBlur = 12;
    ctx.font = '11px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.translate(x,y); ctx.rotate(a + Math.PI/2);
    ctx.fillText(RUNE_CHARS[i % RUNE_CHARS.length], 0, 0);
    ctx.restore();
  }

  // Rotating inner spokes
  for (let i=0; i<8; i++) {
    const a = -rot*1.5 + (i/8)*Math.PI*2;
    const x1 = palm.x + Math.cos(a)*10;
    const y1 = palm.y + Math.sin(a)*10;
    const x2 = palm.x + Math.cos(a)*r1;
    const y2 = palm.y + Math.sin(a)*r1;
    glowLine(x1,y1,x2,y2, gold+'66', 0.8, 8);
  }

  // Sling-ring spark at center
  glowDot(palm.x,palm.y, 5, white, 35);

  // Fingertips — spark emitters
  TIPS.forEach((ti, i) => {
    const p = toC(lms[ti]);
    const pulse = 0.5 + 0.5*Math.sin(frameCount*0.15+i*1.2);
    glowCircle(p.x,p.y, 8+pulse*5, gold, 1, 18);
    glowDot(p.x,p.y, 3+pulse, white, 25);
    // Emit particles
    if (frameCount % 2 === 0) {
      particles.push({
        x: p.x, y: p.y,
        vx: (Math.random()-0.5)*3,
        vy: (Math.random()-0.5)*3 - 1,
        life: 1, color: Math.random()<0.5 ? gold : amber,
        size: Math.random()*3+1
      });
    }
  });

  // Pinch = portal spark
  const { pinching } = getPinch(lms);
  if (pinching) {
    const t4=toC(lms[4]), t8=toC(lms[8]);
    const mx=(t4.x+t8.x)/2, my=(t4.y+t8.y)/2;
    glowDot(mx,my, 12, white, 50);
    for (let i=0; i<8; i++) {
      const a = (i/8)*Math.PI*2 + frameCount*0.1;
      const r = 20+Math.sin(frameCount*0.2+i)*8;
      glowLine(mx,my, mx+Math.cos(a)*r, my+Math.sin(a)*r, gold, 1.5, 15);
    }
    // Emit burst sparks
    for (let i=0; i<3; i++) {
      sparks.push({
        x:mx, y:my,
        vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8,
        life:1, color: white
      });
    }
  }
}

function drawStrangeBeam(h0, h1) {
  const gold  = '#ffaa00';
  const amber = '#ff6600';
  const white = '#fffde0';

  const pairs = [[4,4],[8,8],[12,12],[16,16],[20,20],[0,0]];
  pairs.forEach(([a,b], i) => {
    const p1=toC(h0[a]), p2=toC(h1[b]);
    const t = frameCount*0.003 + i*0.15;
    const hue = 30 + Math.sin(t)*20;
    const c = `hsla(${hue},100%,60%,0.95)`;
    // Main beam
    glowLine(p1.x,p1.y,p2.x,p2.y, c, 2, 25);
    glowLine(p1.x,p1.y,p2.x,p2.y, white, 0.5, 5);
    // Sparks along beam
    if (frameCount % 4 === i%4) {
      const r = Math.random();
      const sx = p1.x + (p2.x-p1.x)*r;
      const sy = p1.y + (p2.y-p1.y)*r;
      sparks.push({ x:sx,y:sy, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5-1, life:1, color:gold });
    }
  });

  // Portal circle between palms
  const pa=toC(h0[0]), pb=toC(h1[0]);
  const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
  const pr = dist2(pa,pb)*0.18;
  const rot = frameCount*0.025;

  for (let ring=0; ring<3; ring++) {
    const dir = ring%2===0?1:-1;
    glowCircle(mx,my, pr*(0.5+ring*0.25), ring===0?gold:amber, 1.5-ring*0.3, 20-ring*4, ring===1?[5,4]:[]);
  }
  // Portal runes
  for (let i=0;i<16;i++) {
    const a = rot*(i%2===0?1:-1) + (i/16)*Math.PI*2;
    const x = mx + Math.cos(a)*pr*0.85;
    const y = my + Math.sin(a)*pr*0.85;
    ctx.save();
    ctx.fillStyle = gold+'cc'; ctx.shadowColor=gold; ctx.shadowBlur=10;
    ctx.font='10px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.translate(x,y); ctx.rotate(a+Math.PI/2);
    ctx.fillText(RUNE_CHARS[i%RUNE_CHARS.length],0,0);
    ctx.restore();
  }
  // Portal glow center
  const grd = ctx.createRadialGradient(mx,my,0, mx,my,pr*0.4);
  grd.addColorStop(0,'rgba(255,170,0,0.25)');
  grd.addColorStop(1,'rgba(255,100,0,0)');
  ctx.save(); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(mx,my,pr*0.4,0,Math.PI*2); ctx.fill(); ctx.restore();
}

function updateParticles() {
  // Update and draw particles
  particles = particles.filter(p => p.life > 0.05);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life -= 0.04;
    p.vx *= 0.97;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  sparks = sparks.filter(s => s.life > 0.05);
  sparks.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.05;
    s.life -= 0.06;
    s.vx *= 0.95; s.vy *= 0.95;
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.shadowColor = s.color; ctx.shadowBlur = 12;
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x,s.y,3*s.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  if (particles.length > 400) particles.splice(0, 50);
  if (sparks.length > 200) sparks.splice(0, 20);
}

// ── MediaPipe result handler ────────────────────────────────────────────────
function onResults(results) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  frameCount++;

  const hands = results.multiHandLandmarks || [];
  lastHands = hands;

  const noHands = hands.length === 0;
  statusEl.style.display = noHands ? 'block' : 'none';
  if (noHands) statusEl.textContent = 'Show your hands to the camera';

  if (mode === 'jarvis') {
    jarvisHUD.classList.add('visible');
    updateJarvisHUD(hands);
    hands.forEach((lms, hi) => drawJarvisHand(lms, hi));
    if (hands.length >= 2) drawJarvisBeam(hands[0], hands[1]);
  } else {
    jarvisHUD.classList.remove('visible');
    updateParticles();
    hands.forEach((lms, hi) => drawStrangeHand(lms, hi));
    if (hands.length >= 2) drawStrangeBeam(hands[0], hands[1]);
    else updateParticles(); // keep drawing particles even with 1 hand
  }
}

// ── MediaPipe init ──────────────────────────────────────────────────────────
const handsDetector = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
handsDetector.setOptions({
  maxNumHands: 2, modelComplexity: 1,
  minDetectionConfidence: 0.7, minTrackingConfidence: 0.5
});
handsDetector.onResults(onResults);

// ── Animation loop ──────────────────────────────────────────────────────────
function startAnimLoop() {
  if (animRunning) return;
  animRunning = true;
  async function loop() {
    if (video.readyState >= 2) {
      try { await handsDetector.send({ image: video }); } catch(e) {}
    } else if (mode === 'strange') {
      // Keep particles alive even before camera
      ctx.clearRect(0,0,canvas.width,canvas.height);
      updateParticles();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ── Camera startup ──────────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('startBtn').style.display = 'none';
  statusEl.textContent = 'Initialising…';
  const tries = [
    { video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} }, audio:false },
    { video: { facingMode:'user' }, audio:false },
    { video: true, audio:false }
  ];
  let stream = null;
  for (const c of tries) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e) { console.warn('retry', e.name); }
  }
  if (!stream) {
    statusEl.textContent = '⚠ Camera denied. Allow camera and reload.';
    return;
  }
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play().then(() => {
      statusEl.textContent = 'Show your hands to the camera';
      jarvisHUD.classList.add('visible');
      startAnimLoop();
    }).catch(e => { statusEl.textContent = '⚠ ' + e.message; });
  };
}

// ── Boot ────────────────────────────────────────────────────────────────────
(async function init() {
  if (!navigator.mediaDevices?.getUserMedia) {
    statusEl.textContent = '⚠ Use HTTPS in Chrome or Safari.';
    return;
  }
  try { await startCamera(); }
  catch(e) {
    document.getElementById('startBtn').style.display = 'block';
    statusEl.textContent = '';
  }
})();
</script>
</body>
