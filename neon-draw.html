<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>✦ NEON DRAW — Hand Gesture Canvas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap');

:root {
  --pink: #ff4db8;
  --hot:  #ff85d0;
  --white:#ffffff;
  --yellow:#ffe066;
  --cyan: #00f0ff;
  --green:#39ff14;
  --bg:   #0d0d0d;
  --panel:#161616;
  --border:rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Syne',sans-serif; }

/* ── BOOT ── */
#boot {
  position:fixed; inset:0; z-index:999;
  background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#boot.gone { display:none; }

.boot-logo {
  font-size:52px; font-weight:800; letter-spacing:-2px;
  background: linear-gradient(135deg, var(--pink), var(--hot), var(--yellow));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 24px rgba(255,77,184,0.6));
}
.boot-sub {
  font-family:'DM Mono', monospace; font-size:11px; letter-spacing:3px;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
}
.boot-gestures {
  display:flex; gap:18px; margin:10px 0;
}
.boot-g {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:14px 18px;
  border:1px solid rgba(255,77,184,0.2); border-radius:12px;
  background:rgba(255,77,184,0.04);
}
.boot-g .icon { font-size:26px; }
.boot-g .label { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.4); text-transform:uppercase; }
.boot-g .action { font-size:10px; color:var(--pink); font-weight:700; letter-spacing:1px; }

#start-btn {
  margin-top:8px; padding:14px 44px;
  background: linear-gradient(135deg, var(--pink), #c2006e);
  border:none; border-radius:100px;
  color:#fff; font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer;
  box-shadow: 0 0 30px rgba(255,77,184,0.5);
  transition: all 0.2s;
}
#start-btn:hover { transform:scale(1.04); box-shadow:0 0 45px rgba(255,77,184,0.75); }

/* ── MAIN LAYOUT ── */
#app { position:relative; width:100%; height:100dvh; }

video { display:none; }

#bg-canvas, #draw-canvas {
  position:absolute; inset:0; width:100%; height:100%;
}
#bg-canvas  { z-index:1; }
#draw-canvas{ z-index:2; pointer-events:none; }

/* ── SIDE PANEL ── */
#panel {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  z-index:20;
  display:flex; flex-direction:column; gap:10px; align-items:center;
  background:rgba(14,14,14,0.85); backdrop-filter:blur(14px);
  border:1px solid var(--border); border-radius:16px;
  padding:12px 8px;
}

.section-label {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:2px;
  color:rgba(255,255,255,0.25); text-transform:uppercase; margin-top:2px;
}
.divider { width:28px; height:1px; background:var(--border); }

.color-swatch {
  width:26px; height:26px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all 0.18s; position:relative;
}
.color-swatch.active {
  border-color:#fff;
  box-shadow: 0 0 12px currentColor;
  transform:scale(1.2);
}

.slider-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
.slider-wrap label { font-size:8px; letter-spacing:1.5px; color:rgba(255,255,255,0.3); text-transform:uppercase; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  writing-mode:vertical-lr; direction:rtl;
  width:6px; height:70px; border-radius:3px;
  background:rgba(255,255,255,0.1); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:var(--pink);
  box-shadow:0 0 8px var(--pink);
}

.tool-btn {
  width:36px; height:36px; border-radius:10px;
  border:1px solid var(--border); background:transparent;
  color:rgba(255,255,255,0.45); font-size:16px;
  cursor:pointer; transition:all 0.18s; display:flex; align-items:center; justify-content:center;
}
.tool-btn:hover, .tool-btn.active {
  background:rgba(255,77,184,0.18); border-color:var(--pink);
  color:var(--pink); box-shadow:0 0 10px rgba(255,77,184,0.3);
}
.tool-btn.clear-btn:hover {
  background:rgba(255,60,60,0.18); border-color:#ff3c3c;
  color:#ff3c3c; box-shadow:0 0 10px rgba(255,60,60,0.3);
}

/* ── STATUS BAR ── */
#status-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px 14px;
  background:linear-gradient(0deg,rgba(13,13,13,0.9) 0%,transparent 100%);
}
.status-pill {
  display:flex; align-items:center; gap:7px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.5px;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
}
.dot { width:6px; height:6px; border-radius:50%; background:#333; }
.dot.on { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

#mode-badge {
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--pink); text-shadow:0 0 12px var(--pink);
  min-width:160px; text-align:center;
}

/* ── TOP BAR ── */
#top-bar {
  position:absolute; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px 0;
  background:linear-gradient(180deg,rgba(13,13,13,0.88) 0%,transparent 100%);
}
.app-title {
  font-size:16px; font-weight:800; letter-spacing:-0.5px;
  background:linear-gradient(90deg,var(--pink),var(--hot));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.hand-count {
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px;
  color:rgba(255,255,255,0.3); text-transform:uppercase;
}

/* cursor dot */
#cursor {
  position:absolute; z-index:30; pointer-events:none;
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--pink);
  box-shadow:0 0 12px var(--pink);
  transform:translate(-50%,-50%);
  transition: width 0.1s, height 0.1s, background 0.1s;
  display:none;
}
#cursor.grab { background:rgba(255,77,184,0.3); width:30px; height:30px; }
#cursor.erase { background:rgba(255,60,60,0.3); border-color:#ff3c3c; box-shadow:0 0 12px #ff3c3c; width:32px; height:32px; }
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-logo">✦ NEON DRAW</div>
  <div class="boot-sub">Hand Gesture Canvas · AR Drawing</div>

  <div class="boot-gestures">
    <div class="boot-g">
      <div class="icon">☝️</div>
      <div class="action">DRAW</div>
      <div class="label">Index up</div>
    </div>
    <div class="boot-g">
      <div class="icon">✌️</div>
      <div class="action">GRAB</div>
      <div class="label">Two fingers</div>
    </div>
    <div class="boot-g">
      <div class="icon">✊</div>
      <div class="action">IDLE</div>
      <div class="label">Fist</div>
    </div>
    <div class="boot-g">
      <div class="icon">🤙</div>
      <div class="action">ERASE</div>
      <div class="label">Pinky up</div>
    </div>
  </div>

  <button id="start-btn">▶ START DRAWING</button>
</div>

<!-- APP -->
<div id="app">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="bg-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>
  <div id="cursor"></div>

  <!-- TOP -->
  <div id="top-bar">
    <div class="app-title">✦ NEON DRAW</div>
    <div class="hand-count">HANDS: <span id="hcount">0</span></div>
  </div>

  <!-- SIDE PANEL -->
  <div id="panel">
    <div class="section-label">COLOR</div>
    <div class="color-swatch active" data-color="#ff85d0" style="background:#ff85d0;color:#ff85d0"></div>
    <div class="color-swatch" data-color="#ff4db8" style="background:#ff4db8;color:#ff4db8"></div>
    <div class="color-swatch" data-color="#ff6b35" style="background:#ff6b35;color:#ff6b35"></div>
    <div class="color-swatch" data-color="#ffe066" style="background:#ffe066;color:#ffe066"></div>
    <div class="color-swatch" data-color="#39ff14" style="background:#39ff14;color:#39ff14"></div>
    <div class="color-swatch" data-color="#00f0ff" style="background:#00f0ff;color:#00f0ff"></div>
    <div class="color-swatch" data-color="#ffffff" style="background:#fff;color:#fff"></div>

    <div class="divider"></div>
    <div class="section-label">SIZE</div>
    <div class="slider-wrap">
      <input type="range" id="thickness" min="2" max="28" value="6" orient="vertical"/>
      <label>PX</label>
    </div>

    <div class="divider"></div>
    <div class="section-label">GLOW</div>
    <div class="slider-wrap">
      <input type="range" id="glow" min="0" max="40" value="18" orient="vertical"/>
      <label>%</label>
    </div>

    <div class="divider"></div>
    <div class="section-label">TOOL</div>
    <button class="tool-btn active" id="btn-draw" title="Draw">✏️</button>
    <button class="tool-btn" id="btn-erase" title="Eraser">🧹</button>
    <button class="tool-btn clear-btn" id="btn-clear" title="Clear all">🗑️</button>
    <button class="tool-btn" id="btn-save" title="Save image">💾</button>
  </div>

  <!-- STATUS -->
  <div id="status-bar">
    <div class="status-pill"><div class="dot" id="cam-dot"></div>CAM</div>
    <div id="mode-badge">— READY —</div>
    <div class="status-pill"><div class="dot" id="track-dot"></div>TRACKING</div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ── ELEMENTS ──
const bgCanvas   = document.getElementById('bg-canvas');
const drawCanvas = document.getElementById('draw-canvas');
const bgCtx      = bgCanvas.getContext('2d');
const drawCtx    = drawCanvas.getContext('2d');
const video      = document.getElementById('webcam');
const cursorEl   = document.getElementById('cursor');
const modeBadge  = document.getElementById('mode-badge');
const hcountEl   = document.getElementById('hcount');
const camDot     = document.getElementById('cam-dot');
const trackDot   = document.getElementById('track-dot');

// ── STATE ──
let W, H;
let currentColor = '#ff85d0';
let thickness    = 6;
let glowBlur     = 18;
let activeTool   = 'draw'; // draw | erase

// Drawing strokes stored as path segments for MOVE support
// stroke = { color, thickness, blur, points:[{x,y}] }
let strokes      = [];
let currentStroke= null;

// Grab state
let grabbing     = false;
let grabStrokeIdx= -1;    // which stroke is grabbed
let grabOffsets  = [];    // per-point offsets from grab origin
let grabOrigin   = null;  // {x,y} where grab started

let lastDrawPt   = null;

// Smoothing
let smoothX = 0, smoothY = 0;
const SMOOTH = 0.45;

// frame from webcam
let frame = null;

// ── RESIZE ──
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  bgCanvas.width   = W; bgCanvas.height   = H;
  drawCanvas.width = W; drawCanvas.height = H;
  redrawAll();
}
resize();
window.addEventListener('resize', resize);

// ── PANEL CONTROLS ──
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
    activeTool = 'draw';
    syncToolBtns();
  });
});

document.getElementById('thickness').addEventListener('input', e => { thickness = +e.target.value; });
document.getElementById('glow').addEventListener('input', e => { glowBlur = +e.target.value; });

document.getElementById('btn-draw').addEventListener('click', () => { activeTool='draw'; syncToolBtns(); });
document.getElementById('btn-erase').addEventListener('click', () => { activeTool='erase'; syncToolBtns(); });
document.getElementById('btn-clear').addEventListener('click', () => { strokes=[]; currentStroke=null; redrawAll(); });
document.getElementById('btn-save').addEventListener('click', saveImage);

function syncToolBtns() {
  document.getElementById('btn-draw').classList.toggle('active', activeTool==='draw');
  document.getElementById('btn-erase').classList.toggle('active', activeTool==='erase');
}

// ── DRAW ALL STROKES ──
function redrawAll() {
  drawCtx.clearRect(0,0,W,H);
  strokes.forEach(s => drawStroke(s));
  if (currentStroke) drawStroke(currentStroke);
}

function drawStroke(stroke) {
  const pts = stroke.points;
  if (pts.length < 2) return;
  drawCtx.save();
  drawCtx.lineCap   = 'round';
  drawCtx.lineJoin  = 'round';
  drawCtx.lineWidth = stroke.thickness;
  drawCtx.strokeStyle = stroke.color;
  drawCtx.shadowColor = stroke.color;
  drawCtx.shadowBlur  = stroke.blur;
  // also draw white core for neon
  drawCtx.beginPath();
  drawCtx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) drawCtx.lineTo(pts[i].x, pts[i].y);
  drawCtx.stroke();
  // white core
  drawCtx.lineWidth   = Math.max(1, stroke.thickness * 0.3);
  drawCtx.strokeStyle = 'rgba(255,255,255,0.55)';
  drawCtx.shadowBlur  = 0;
  drawCtx.beginPath();
  drawCtx.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) drawCtx.lineTo(pts[i].x, pts[i].y);
  drawCtx.stroke();
  drawCtx.restore();
}

// ── ERASE near point ──
function eraseNear(x,y,radius=36) {
  const r2 = radius*radius;
  strokes = strokes.map(s => {
    // split stroke removing points near (x,y)
    const segs = [];
    let cur = [];
    s.points.forEach(p => {
      const d2 = (p.x-x)**2+(p.y-y)**2;
      if (d2 < r2) {
        if (cur.length>1) segs.push({...s, points:[...cur]});
        cur=[];
      } else { cur.push(p); }
    });
    if (cur.length>1) segs.push({...s, points:[...cur]});
    return segs;
  }).flat();
  redrawAll();
}

// ── GRAB helpers ──
function findStrokeNear(x,y,radius=50) {
  const r2=radius*radius;
  for (let i=strokes.length-1;i>=0;i--) {
    for (const p of strokes[i].points) {
      if ((p.x-x)**2+(p.y-y)**2<r2) return i;
    }
  }
  return -1;
}

// ── SAVE ──
function saveImage() {
  const tmp = document.createElement('canvas');
  tmp.width=W; tmp.height=H;
  const tc = tmp.getContext('2d');
  // draw webcam bg
  tc.save(); tc.scale(-1,1); tc.drawImage(video,-W,0,W,H); tc.restore();
  tc.fillStyle='rgba(13,13,13,0.35)'; tc.fillRect(0,0,W,H);
  tc.drawImage(drawCanvas,0,0);
  const a=document.createElement('a');
  a.href=tmp.toDataURL('image/png');
  a.download='neon-draw.png'; a.click();
}

// ── GESTURE DETECTION ──
function detectGesture(lm) {
  const tipIds = [8,12,16,20];
  const mcpIds = [5, 9,13,17];
  let ext=0;
  tipIds.forEach((t,i)=>{ if(lm[t].y<lm[mcpIds[i]].y) ext++; });

  const indexUp = lm[8].y < lm[6].y;
  const middleUp= lm[12].y< lm[10].y;
  const ringUp  = lm[16].y< lm[14].y;
  const pinkyUp = lm[20].y< lm[18].y;
  const thumbUp = lm[4].x < lm[3].x; // mirrored

  if (ext===0) return 'fist';
  if (indexUp && middleUp && !ringUp && !pinkyUp) return 'grab';  // ✌️ two fingers = grab/move
  if (!indexUp && !middleUp && !ringUp && pinkyUp) return 'erase'; // 🤙 pinky = erase
  if (indexUp && !middleUp && !ringUp && !pinkyUp) return 'draw';  // ☝️ index only = draw
  return 'idle';
}

function indexTip(lm,W,H) {
  return { x:(1-lm[8].x)*W, y:lm[8].y*H };
}
function indexMid(lm,W,H) {
  // midpoint of index+middle for grab
  return { x:(1-(lm[8].x+lm[12].x)/2)*W, y:((lm[8].y+lm[12].y)/2)*H };
}

// ── RENDER LOOP ──
function renderBg() {
  requestAnimationFrame(renderBg);
  bgCtx.clearRect(0,0,W,H);
  if (frame) {
    bgCtx.save();
    bgCtx.scale(-1,1);
    bgCtx.drawImage(frame,-W,0,W,H);
    bgCtx.restore();
  } else {
    bgCtx.fillStyle='#0d0d0d';
    bgCtx.fillRect(0,0,W,H);
  }
  bgCtx.fillStyle='rgba(13,13,13,0.32)';
  bgCtx.fillRect(0,0,W,H);
}
renderBg();

// ── MEDIAPIPE ──
function initHands() {
  const hands = new Hands({
    locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.72,
    minTrackingConfidence:0.65,
  });

  hands.onResults(results => {
    frame = results.image;
    trackDot.classList.toggle('on', !!(results.multiHandLandmarks && results.multiHandLandmarks.length));
    hcountEl.textContent = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;

    if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
      // Finalise current stroke
      if (currentStroke && currentStroke.points.length>1) { strokes.push(currentStroke); }
      currentStroke=null; lastDrawPt=null; grabbing=false;
      modeBadge.textContent='— IDLE —';
      cursorEl.style.display='none';
      return;
    }

    const lm = results.multiHandLandmarks[0];
    const gesture = detectGesture(lm);

    let tipPt, grabPt;

    // ── DRAW ──
    if (gesture==='draw' || (activeTool==='draw' && gesture==='draw')) {
      tipPt = indexTip(lm,W,H);
      smoothX = smoothX+(tipPt.x-smoothX)*SMOOTH;
      smoothY = smoothY+(tipPt.y-smoothY)*SMOOTH;

      if (grabbing) { grabbing=false; grabStrokeIdx=-1; }

      if (!currentStroke) {
        currentStroke = { color:currentColor, thickness, blur:glowBlur, points:[] };
      }
      if (!lastDrawPt || Math.hypot(smoothX-lastDrawPt.x,smoothY-lastDrawPt.y)>3) {
        currentStroke.points.push({x:smoothX,y:smoothY});
        lastDrawPt={x:smoothX,y:smoothY};
        redrawAll();
      }

      modeBadge.textContent='✏️ DRAWING';
      cursorEl.style.left=smoothX+'px'; cursorEl.style.top=smoothY+'px';
      cursorEl.style.display='block';
      cursorEl.className='';

    } else if (gesture==='grab') {
      // Finalise stroke first
      if (currentStroke && currentStroke.points.length>1) { strokes.push(currentStroke); currentStroke=null; }
      lastDrawPt=null;

      grabPt = indexMid(lm,W,H);
      smoothX = smoothX+(grabPt.x-smoothX)*SMOOTH;
      smoothY = smoothY+(grabPt.y-smoothY)*SMOOTH;

      if (!grabbing) {
        // Find closest stroke
        grabStrokeIdx = findStrokeNear(smoothX,smoothY);
        if (grabStrokeIdx>=0) {
          grabOrigin={x:smoothX,y:smoothY};
          grabOffsets = strokes[grabStrokeIdx].points.map(p=>({dx:p.x-smoothX,dy:p.y-smoothY}));
          grabbing=true;
        }
      } else if (grabbing && grabStrokeIdx>=0) {
        // Move stroke
        strokes[grabStrokeIdx].points = grabOffsets.map(o=>({
          x: smoothX+o.dx, y: smoothY+o.dy
        }));
        redrawAll();
      }

      modeBadge.textContent = grabbing && grabStrokeIdx>=0 ? '✌️ MOVING' : '✌️ GRAB';
      cursorEl.style.left=smoothX+'px'; cursorEl.style.top=smoothY+'px';
      cursorEl.style.display='block'; cursorEl.className='grab';

    } else if (gesture==='erase') {
      if (currentStroke && currentStroke.points.length>1) { strokes.push(currentStroke); currentStroke=null; }
      lastDrawPt=null; grabbing=false;

      tipPt = indexTip(lm,W,H);
      smoothX = smoothX+(tipPt.x-smoothX)*SMOOTH;
      smoothY = smoothY+(tipPt.y-smoothY)*SMOOTH;
      eraseNear(smoothX,smoothY, 36+(thickness*1.5));

      modeBadge.textContent='🧹 ERASING';
      cursorEl.style.left=smoothX+'px'; cursorEl.style.top=smoothY+'px';
      cursorEl.style.display='block'; cursorEl.className='erase';

    } else {
      // idle / fist → commit stroke
      if (currentStroke && currentStroke.points.length>1) { strokes.push(currentStroke); }
      currentStroke=null; lastDrawPt=null;
      if (gesture!=='grab') { grabbing=false; }

      tipPt = indexTip(lm,W,H);
      smoothX = smoothX+(tipPt.x-smoothX)*SMOOTH;
      smoothY = smoothY+(tipPt.y-smoothY)*SMOOTH;

      modeBadge.textContent='— IDLE —';
      cursorEl.style.left=smoothX+'px'; cursorEl.style.top=smoothY+'px';
      cursorEl.style.display='block'; cursorEl.className='';
    }
  });

  const cam = new Camera(video, {
    onFrame: async()=>{ await hands.send({image:video}); },
    width:1280, height:720,
  });
  cam.start().then(()=>{
    camDot.classList.add('on');
  }).catch(()=>{ modeBadge.textContent='⚠ CAMERA DENIED'; });
}

// ── START ──
document.getElementById('start-btn').addEventListener('click', ()=>{
  document.getElementById('boot').classList.add('gone');
  initHands();
});
</script>
</body>
